<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Tarefinha Cards</title>
  </head>

  <body>
    <!--Classe pai pra não se perder aqui-->
    <div class="pai">
      <!-- --------------card do facebook---------------- -->
      <div class="card card-fb">
        <div class="card-topo">
          <div class="card-topo-esquerda">
            <img class="icone" src="icones/facebook.png" />
            <!-- <img class="icone" src="icones/procurar.png" /> -->
            <input class="input" type="text" placeholder="🔍 Pesquisar..." />
          </div>
          <div>
            <img class="icone" src="icones/casa.png" />
            <img class="icone" src="icones/envelope.png" />
            <img class="icone" src="icones/sino.png" />
            <img class="icone" src="icones/user.png" />
          </div>
        </div>
        <!---------topo acaba aqui, entra o cabeçalho do post------>
        <div>
          <div class="avatar-fb">
            <img class="avatar" src="post nonchan/nonchan.jpg" />
            <div class="nick">
              <p>Akino Nakamura</p>
              <p>22 de março de 2024</p>
            </div>
            <p class="pontinhos">...</p>
          </div>
        </div>

        <!-----------aqui já entra o conteúdo-------->
        <div class="fb-post-texto">
          <p>卒業、卒園おめでとうございます！</p>
          <br />
          <p>
            わたしが赤ん坊とパジャマのまま過ごしている間に
            世界はすっかり卒業、卒園シーズン。
          </p>
        </div>

        <div class="fb-post-imagem">
          <img class="fb-post" src="post nonchan/flor1.jpg" />
          <img class="fb-post" src="post nonchan/flor2.jpg" />
        </div>
        <div class="reações-fb">
          <img class="icone reações-fb" src="icones/like.png" />
          <img class="icone reações-fb" src="icones/amei.png" />
          <p>16</p>
        </div>

        <div class="acoes-fb">
          <button class="acao-fb">
            <img class="icone" src="icones/like-vazio.png" /> Curtir
          </button>
          <button class="acao-fb">
            <img class="icone" src="icones/balão.png" />Comentar
          </button>
          <button class="acao-fb">
            <img class="icone" src="icones/seta.png" />Compartilhar
          </button>
        </div>
        <div class="area-do-user">
          <img class="user" src="icones/user.png" />
          <input type="text" placeholder="Comente" />
        </div>
      </div>

      <!-- -----------card do youtube-------------- -->
      <div class="card card-yt">
        <div class="card-topo">
          <div>
            <img class="icone" src="icones/menu-hamburguer.png" />
            <img class="icone" src="icones/youtube.png" />
          </div>
          <div class="busca">
            <input class="input" type="text" placeholder="Pesquisar" />
            <img class="icone" src="icones/procurar.png" />
          </div>

          <div>
            <img class="icone" src="icones/sino.png" />
            <img class="icone" src="icones/user.png" />
          </div>
        </div>

        <div class="youtube-conteudo">
          <p>Lorem ipsum dolor</p>
        </div>
      </div>

      <!-- ----------------------card do instagram-------- -->
      <div class="card card-ig">
        <div class="card-topo">
          <div>
            <img class="icone" src="icones/instagram.png" />
            <img class="icone" src="icones/procurar.png" />
          </div>
          <div>
            <img class="icone" src="icones/sino.png" />
            <img class="icone" src="icones/aviao.png" />
            <img class="icone" src="icones/user.png" />
          </div>
        </div>

        <div class="insta-conteudo">
          <p>Lorem ipsum dolor</p>
        </div>
      </div>
      <!--------------------insta acaba aqui----------------->
    </div>
  </body>
</html>
